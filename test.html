<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
    }

    .app {
      background: #111;
      color: #eee;
      min-height: 100vh;
      font-family: system-ui;
    }

    .time-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #333;
      background: #1a1a1a;
    }

    input {
      width: 80px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 4px;
    }

    button {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 4px 10px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- TIME BAR (pure HTML now) -->
  <div class="time-bar">
    <span>⏱ Time:</span>
    <input id="timeInput" type="number" value="0" />
    <button onclick="inc()">➕</button>
    <button onclick="dec()">➖</button>
  </div>

  <div id="editor-root"></div>

</div>

<script>
  // ✅ deck source
  window.__DECK__ = {
    deck: [
      {
        type: "table",
        data: [
          ["A", "B"],
          ["C", "D"]
        ]
      }
    ]
  };

  // ✅ simple time control (optional)
  let currentTime = 0;

  function inc() {
    currentTime++;
    document.getElementById("timeInput").value = currentTime;
  }

  function dec() {
    currentTime--;
    document.getElementById("timeInput").value = currentTime;
  }

  console.log("DECK FROM HTML:", window.__DECK__);
</script>
<link rel="stylesheet" href="./build/assets/editor.css">
<!-- ✅ mount app -->
<script type="module" src="./build/js/editor.js"></script>

</body>
</html>
